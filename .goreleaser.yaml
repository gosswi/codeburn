version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: codeburn-darwin
    main: ./cmd/codeburn
    binary: codeburn
    env:
      - CGO_ENABLED=1
      - CC=zig cc
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

  - id: codeburn-linux
    main: ./cmd/codeburn
    binary: codeburn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath

archives:
  - id: codeburn
    name_template: "codeburn_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: agentseal
    name: codeburn
  draft: false
  prerelease: auto
